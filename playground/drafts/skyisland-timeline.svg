<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="40%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" rx="12" fill="url(#bg3)" stroke="#2a2d3e" stroke-width="1.5"/>
  <text x="450" y="36" text-anchor="middle" fill="#475569" font-size="11" letter-spacing="3">空岛演进时间线</text>

  <!-- Timeline line -->
  <line x1="60" y1="110" x2="840" y2="110" stroke="url(#line)" stroke-width="2"/>

  <!-- Node 1: 2018-2019 -->
  <circle cx="100" cy="110" r="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="100" y="88" text-anchor="middle" fill="#475569" font-size="11">2018</text>
  <text x="100" y="138" text-anchor="middle" fill="#94a3b8" font-size="11">天空之城</text>
  <text x="100" y="154" text-anchor="middle" fill="#64748b" font-size="10">跨BU共建</text>
  <text x="100" y="168" text-anchor="middle" fill="#64748b" font-size="10">空岛品牌诞生</text>

  <!-- Node 2: 2022 -->
  <circle cx="290" cy="110" r="8" fill="#1e1a2e" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="290" y="88" text-anchor="middle" fill="#475569" font-size="11">2022</text>
  <text x="290" y="138" text-anchor="middle" fill="#f87171" font-size="11">基础设施合并</text>
  <text x="290" y="154" text-anchor="middle" fill="#64748b" font-size="10">空岛 1.0 废弃</text>

  <!-- Node 3: 2024 -->
  <circle cx="490" cy="110" r="8" fill="#1a2e1a" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="490" y="88" text-anchor="middle" fill="#475569" font-size="11">2024 底</text>
  <text x="490" y="138" text-anchor="middle" fill="#4ade80" font-size="11">空岛 2.0</text>
  <text x="490" y="154" text-anchor="middle" fill="#64748b" font-size="10">FC 监控排查</text>
  <text x="490" y="168" text-anchor="middle" fill="#64748b" font-size="10">品牌重启</text>

  <!-- Node 4: 2025 -->
  <circle cx="670" cy="110" r="8" fill="#1a2030" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="670" y="88" text-anchor="middle" fill="#475569" font-size="11">2025</text>
  <text x="670" y="138" text-anchor="middle" fill="#60a5fa" font-size="11">打通资源</text>
  <text x="670" y="154" text-anchor="middle" fill="#64748b" font-size="10">FC 宣布停维</text>
  <text x="670" y="168" text-anchor="middle" fill="#64748b" font-size="10">多团队协作</text>

  <!-- Node 5: 2026 NOW -->
  <circle cx="840" cy="110" r="10" fill="#1a2a3a" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="840" cy="110" r="5" fill="#60a5fa"/>
  <text x="840" y="84" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">2026 · 现在</text>
  <text x="840" y="138" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">空岛 3.0</text>
  <text x="840" y="154" text-anchor="middle" fill="#94a3b8" font-size="10">平台 MVP 上线</text>
  <text x="840" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">dfctl 发布</text>
</svg>
