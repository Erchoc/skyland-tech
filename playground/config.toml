[site]
title = "空岛云技术"
description = "纯技术 + 架构设计文章合集"
author = "龙野"
url = "https://tech.longye.site"
lang = "zh-CN"

[theme]
color = "#6366f1"
dark = true
layout = "magazine"

[social]
github = "https://github.com/Erchoc/skyland-tech"

[categories]
list = ["架构设计", "工程实践", "性能优化", "基础设施"]

[features]
pwa = true
slides = true
search = true
rss = true
animation = true

[animation]
variant = "slide-up"
duration = 550
stagger = 100
apply_to = ["hero", "article-title", "article-subtitle", "nav-logo"]
reduced_motion = "respect"

[search]
engine = "pagefind"
shortcut = "mod+k"
placeholder = "搜索文章..."
weights = { title = 10, tags = 5, body = 1 }

[fonts]
subset_strategy = "hybrid"
baseline_charset = "cjk-3500"
scan_globs = ["playground/posts/**/*.mdx", "packages/theme/src/**/*.{astro,tsx,ts}"]
preload = true

[analytics]
provider = "umami"
site_id = "13fe5fca-9b91-4a17-a11a-1b5fb3413994"
script_src = "https://cloud.umami.is/script.js"
track_search = true
respect_dnt = true
