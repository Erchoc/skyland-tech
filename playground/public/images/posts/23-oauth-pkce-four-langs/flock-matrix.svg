<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="四门语言下文件锁实现对比矩阵">
  <defs>
    <style>
      :root {
        --cell-ok-bg: #eef7f0;
        --cell-ok-border: #76b487;
        --cell-warn-bg: #fff8e8;
        --cell-warn-border: #e0b540;
        --lang: #15181e;
        --code: #2264d6;
        --note: #3b3d45;
        --badge-ok: #2d7a44;
        --badge-warn: #8a6a12;
        --footer: #656a76;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --cell-ok-bg: #1b2a22;
          --cell-ok-border: #3d6a4e;
          --cell-warn-bg: #2a2316;
          --cell-warn-border: #7a5e28;
          --lang: #efeff1;
          --code: #6f9cff;
          --note: #d5d7db;
          --badge-ok: #5fbf7f;
          --badge-warn: #e0b540;
          --footer: #9aa0a8;
        }
      }
      .cell-warn { fill: var(--cell-warn-bg); stroke: var(--cell-warn-border); stroke-width: 1; }
      .cell-ok { fill: var(--cell-ok-bg); stroke: var(--cell-ok-border); stroke-width: 1; }
      .lang { font: 700 18px "DM Sans", system-ui, sans-serif; fill: var(--lang); }
      .code { font: 13px "JetBrains Mono", monospace; fill: var(--code); }
      .note { font: 12px "Noto Sans SC", system-ui, sans-serif; fill: var(--note); }
      .badge-ok { font: 600 11px "DM Sans", system-ui, sans-serif; fill: var(--badge-ok); }
      .badge-warn { font: 600 11px "DM Sans", system-ui, sans-serif; fill: var(--badge-warn); }
      .footer { font: italic 12px "Noto Sans SC", system-ui, sans-serif; fill: var(--footer); text-anchor: middle; }
    </style>
  </defs>

  <rect class="cell-ok" x="20" y="20" width="340" height="140" rx="8"/>
  <text class="lang" x="40" y="50">Go</text>
  <text class="code" x="40" y="80">syscall.Flock(fd, LOCK_EX)</text>
  <text class="badge-ok" x="40" y="110">✓ 内核级 · 进程 crash 自动释放</text>
  <text class="note" x="40" y="134">stdlib 直接 binding 了 flock(2)</text>

  <rect class="cell-ok" x="380" y="20" width="320" height="140" rx="8"/>
  <text class="lang" x="400" y="50">Python</text>
  <text class="code" x="400" y="80">fcntl.flock(fd, LOCK_EX)</text>
  <text class="badge-ok" x="400" y="110">✓ 内核级 · 进程 crash 自动释放</text>
  <text class="note" x="400" y="134">fcntl 模块直连 POSIX 系统调用</text>

  <rect class="cell-warn" x="20" y="180" width="340" height="140" rx="8"/>
  <text class="lang" x="40" y="210">Node.js</text>
  <text class="code" x="40" y="238">fs.open(lock, 'wx') + PID</text>
  <text class="badge-warn" x="40" y="268">⚠ 应用级 · 需要 stale 检测</text>
  <text class="note" x="40" y="292">O_EXCL 模拟 · 进程 crash 留孤儿锁</text>

  <rect class="cell-warn" x="380" y="180" width="320" height="140" rx="8"/>
  <text class="lang" x="400" y="210">Rust (std-only)</text>
  <text class="code" x="400" y="238">create_new(true) + PID</text>
  <text class="badge-warn" x="400" y="268">⚠ 应用级 · 需要 stale 检测</text>
  <text class="note" x="400" y="292">std 无 flock binding · libc crate 才有</text>

  <text class="footer" x="360" y="348">stdlib 覆盖 POSIX 系统调用的程度 · 决定了锁实现的优雅度</text>
</svg>
